<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さくら坂3丁目 自治会 周知</title>
  <style>
    body {
      font-family: "Yu Gothic", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
    }
    .photo {
      flex: 1 1 250px;
      max-width: 250px;
    }
    .photo img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .content {
      flex: 2 1 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      color: #333;
      text-align: center;
      margin-bottom: 20px;
    }
    .date, .notice {
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
    }
    .notice {
      background: #ffcc33;
    }
    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="photo">
      <img src="https://raw.githubusercontent.com/Its-jin0124/notice-site/main/sakura.jpg" alt="桜の写真">
      <p style="font-size:0.8rem; text-align:center;">（試行版）<br>アクセス数：</p>
    </div>

    <div class="content">
      <h1>♪ さくら坂3丁目　自治会　周知　♪</h1>
      <div class="date">周知日付：2026年6月12日</div>
      <div class="notice">内容：ここに周知内容が表示されます。</div>
      <div class="footer">© さくら坂3丁目 自治会</div>
    </div>
  </div>

</body>
</html>
