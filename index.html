<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さくら坂3丁目 自治会 周知</title>
  <style>
    body {
      font-family: "Yu Gothic", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
    }

    /* ▼ PC用画像（デフォルト表示） */
    .pc-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: block;
    }

    /* ▼ スマホ用画像（デフォルトは非表示） */
    .sp-img {
      display: none;
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .content {
      flex: 2 1 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
    }

    /* ▼ タイトル（PCでも少し小さめ） */
    h1 {
      font-size: 1.2rem;
      color: #333;
      text-align: center;
      margin-bottom: 15px;
      line-height: 1.3;
      white-space: nowrap; /* 強制1行 */
    }

    .date {
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 15px;
      font-size: 0.95rem;
      display: inline-block;
    }

    .notice {
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 10px;
      background: #ffec80;
      min-height: 4.5em;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-top: 20px;
    }

    /* ▼▼ スマホ専用の最適化 ▼▼ */
    @media (max-width: 600px) {

      /* PC画像を非表示、スマホ画像を表示 */
      .pc-img { display: none; }
      .sp-img { display: block; }

      h1 {
        font-size: 1rem;
        margin-bottom: 10px;
      }

      .notice {
        font-size: 1rem;
        min-height: 5em;
      }

      body {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PC用画像 -->
    <img src="sakura.jpg" class="pc-img" alt="桜の写真（PC用）">

    <!-- スマホ用画像 -->
    <img src="smaPhSakura.jpg" class="sp-img" alt="桜の写真（スマホ用）">

    <div class="content">
      <h1>♪ さくら坂3丁目 自治会 周知 ♪</h1>

      <div class="date">周知日付：2026年06月12日 17:21</div>

      <div class="notice">
ここに周知内容が表示されます。
長文になっても自動で高さが伸びます。
      </div>

      <div class="footer">© さくら坂3丁目 自治会</div>
    </div>

  </div>

</body>
</html>
